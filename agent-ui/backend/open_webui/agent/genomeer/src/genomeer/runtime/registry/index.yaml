envs:
  - name: bio-agent-env1
    description: "General-purpose Python 3.11 agent environment (LLM + analytics + notebooks)."
    spec: "default-agent.yaml"
    python: "3.11"
    provides_bins:
      - python
      - pip
      - jupyter
      - jupyter-notebook
    provides_py:
      - numpy==2.1
      - pandas
      - matplotlib
      - scipy
      - statsmodels
      - scikit-learn
      - gradio
      - langchain
      - langgraph==0.3.18
      - langchain-openai
      - langchain-anthropic
      - langchain-ollama
      - langchain-community
      - openai
      - beautifulsoup4
      - lxml
      - tqdm
      - seaborn
      - networkx
      - requests
      - pyyaml
      - jupyter
      - notebook
      - ipykernel
      - pytest
      - transformers
      - sentencepiece
      - mcp
      - tooluniverse
      - python-dotenv
    provides_r: []

  - name: btools_env_py310
    description: "Bioinformatics CLI stack with CNVkit, BWA, samtools, bedtools, and OptiType (Python 3.10)."
    spec: "hla-tools.yaml"
    python: "3.10"
    provides_bins:
      - samtools
      - bedtools
      - bwa
      - cnvkit
      - cnvkit.py
      - OptiType
      - OptiTypePipeline.py
      - python
    provides_py:
      - cnvkit
      - rich
    provides_r: []
