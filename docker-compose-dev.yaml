  # FRONTEND (SvelteKit/Vite dev server with HMR)
    genomeer-ui:
      image: node:24-bookworm
      container_name: genomeer-ui
      working_dir: /workspace
      command: bash -lc "npm install --no-audit --no-fund && npm run dev -- --host 0.0.0.0 --port 5173"
      ports:
        - "5050:5173"                 # open http://localhost:5050
      environment:
        # UI will call backend via Vite proxy (see vite.config.ts below)
        - OLLAMA_BASE_URL=http://backend:8080/ollama
      volumes:
        - ./agent-ui:/workspace       # bind source (frontend + backend repo)
        - /workspace/node_modules     # keep deps inside container
      # depends_on:
      #   - backend
      restart: unless-stopped

  # BACKEND (Uvicorn autoreload)
  # backend:
