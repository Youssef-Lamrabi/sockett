name: CI

on:
  push:
    branches: [main, master, dev]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-

      - name: Install package and test deps
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]" --no-deps || pip install -e "."
          pip install pytest pytest-cov

      - name: Run unit tests (no real bioinformatics tools required)
        env:
          GENOMEER_SKIP_ENV_INSTALL: "1"
          GENOMEER_CACHE_DISABLED: "1"
          GENOMEER_RAG_OFFLINE: "1"
        run: |
          pytest tests/unit/ -v --tb=short \
            --cov=genomeer --cov-report=term-missing \
            --cov-fail-under=30 \
            -x

      - name: Run integration tests (mocked envs)
        env:
          GENOMEER_SKIP_ENV_INSTALL: "1"
          GENOMEER_CACHE_DISABLED: "1"
          GENOMEER_RAG_OFFLINE: "1"
        run: |
          pytest tests/integration/ -v --tb=short -x || true

      - name: Upload coverage report
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: .coverage

  security:
    name: Security Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install pip-audit
        run: pip install pip-audit
      - name: Audit dependencies
        run: |
          pip install -e "." --no-deps 2>/dev/null || true
          pip-audit --desc || true

  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install ruff
        run: pip install ruff
      - name: Lint
        run: ruff check src/ tests/ --select E,F,W --ignore E501,W503 || true
