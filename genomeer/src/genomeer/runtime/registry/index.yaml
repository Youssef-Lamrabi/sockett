envs:
  - name: bio-agent-env1
    description: "General-purpose Python 3.11 agent environment (LLM + analytics)."
    spec: "default-agent.yaml"
    python: "3.11"
    provides_bins:
      - python
      - pip
    provides_py:
      - numpy
      - pandas
      - matplotlib
      - scipy
      - statsmodels
      - scikit-learn
      - langchain
      - langgraph
      - langchain-openai
      - langchain-anthropic
      - langchain-ollama
      - langchain-community
      - openai
      - beautifulsoup4
      - lxml
      - tqdm
      - seaborn
      - networkx
      - requests
      - pyyaml
      - python-dotenv
      - mcp
      - tooluniverse
    provides_r: []

  - name: meta-env1
    description: "Metagenomics CLI stack: binning, taxonomy, functional annotation, QC."
    spec: "meta-env1.yaml"
    python: "3.10"
    provides_bins:
      - quast.py
      - SemiBin2
      - concoct
      - cut_up_fasta.py
      - concoct_coverage_table.py
      - merge_cutup_clustering.py
      - extract_fasta_bins.py
      - run_MaxBin2.pl
      - checkm2
      - kraken2
      - sylph
      - kaiju
      - kaiju2table
      - hmmscan
      - hmmsearch
      - hmmpress
      - emapper.py
      - diamond
      - humann
      - humann_renorm_table
      - antismash
      - genomad
      - abricate
      - seqkit
      - fastqc
      - fastp
      - megahit
      - minimap2
      - metabat2
      - jgi_summarize_bam_contig_depths
      - sylph
      - wgsim
      - bbduk.sh
      - run_dbcan.py
      - pharokka.py
      - lefse_format_input.py
      - lefse_run.py
      - lefse_plot_res.py
      - nonpareil
      - Rscript
    provides_py:
      - biopython
      - numpy
      - pandas
      - matplotlib
      - scipy
    provides_r: []

  - name: btools_env_py310
    description: "Bioinformatics CLI stack with CNVkit, BWA, samtools, bedtools, and OptiType (Python 3.10)."
    spec: "hla-tools.yaml"
    python: "3.10"
    provides_bins:
      - samtools
      - bedtools
      - bwa
      - cnvkit
      - cnvkit.py
      - OptiType
      - OptiTypePipeline.py
      - python
    provides_py:
      - cnvkit
      - rich
    provides_r: []
