envs:
  - name: bio-agent-env1
    description: "General-purpose Python 3.11 agent environment (LLM + analytics)."
    spec: "default-agent.yaml"
    python: "3.11"
    provides_bins:
      - python
      - pip
    provides_py:
      - numpy
      - pandas
      - matplotlib
      - scipy
      - statsmodels
      - scikit-learn
      - langchain
      - langgraph
      - langchain-openai
      - langchain-anthropic
      - langchain-ollama
      - langchain-community
      - openai
      - beautifulsoup4
      - lxml
      - tqdm
      - seaborn
      - networkx
      - requests
      - pyyaml
      - python-dotenv
      - mcp
      - tooluniverse
    provides_r: []

  - name: meta-env1
    description: "Metagenomics CLI stack: binning, taxonomy, functional annotation, QC."
    spec: "meta-env1.yaml"
    python: "3.12"
    provides_bins:
      - quast.py
      - SemiBin2
      - concoct
      - cut_up_fasta.py
      - concoct_coverage_table.py
      - merge_cutup_clustering.py
      - extract_fasta_bins.py
      - run_MaxBin.pl
      - DAS_Tool
      - Fasta_to_Contig2Bin.sh
      - checkm2
      - gunc
      - kraken2
      - metaphlan
      - esearch
      - efetch
      - esummary
      - gget
      - sylph
      - kaiju
      - kaiju2table
      - hmmscan
      - hmmsearch
      - hmmpress
      - emapper.py
      - diamond
      # humann / humann_renorm_table intentionally NOT declared: the binary is
      # commented-out in meta-env1.yaml (needs multiple large DBs, not installed).
      # Declaring it here falsely marked humann3 as "available" to the planner.
      - antismash
      - genomad
      - abricate
      - rgi
      - amrfinder
      - amrfinder_update
      - seqkit
      - fastqc
      - fastp
      - megahit
      - minimap2
      - metabat2
      - jgi_summarize_bam_contig_depths
      - sylph
      - wgsim
      - bwa
      - bcftools
      - samtools
      - prokka
      - prodigal
      - barrnap
      - mafft
      - fasttree
      - FastTree
      - trimal
      - spades.py
      - metaspades.py
      - rnaspades.py
      - plasmidspades.py
      - makeblastdb
      - blastp
      - blastn
      - bracken
      - bbduk.sh
      - run_dbcan
      - pharokka.py
      - lefse_format_input.py
      - lefse_run.py
      - lefse_plot_res.py
      - nonpareil
      - Rscript
      - multiqc
      - iss
      - spades.py
      - metaspades.py
      - bowtie2
      - bowtie2-build
      - bwa
      - coverm
      - mob_recon
      - mob_typer
      - mob_cluster
      - mob_init
      - drep
      - irep
      - inStrain
      - mash
      - fastani
      - bedtools
      - medaka_consensus
      - racon
      - unicycler
      - flye
      - filtlong
      - NanoPlot
    provides_py:
      - biopython
      - numpy
      - pandas
      - matplotlib
      - scipy
      - InSilicoSeq
    provides_r: []

  - name: btools_env_py310
    description: "Bioinformatics CLI stack with CNVkit, BWA, samtools, bedtools, and OptiType (Python 3.10)."
    spec: "hla-tools.yaml"
    python: "3.10"
    provides_bins:
      - samtools
      - bedtools
      - bwa
      - cnvkit
      - cnvkit.py
      - OptiType
      - OptiTypePipeline.py
      - python
    provides_py:
      - cnvkit
      - rich
    provides_r: []

  - name: amplicon-env1
    description: "Amplicon 16S/18S/ITS marker-gene stack: DADA2 (ASV inference) + phyloseq/vegan (alpha/beta diversity, PERMANOVA). Isolated R 4.5 / Bioconductor env, kept separate from meta-env1 to avoid dependency conflicts."
    spec: "amplicon-env1.yaml"
    python: "n/a"   # R-based env (R 4.5.3); routed via DADA2/phyloseq code signals
    provides_bins:
      - Rscript
      - R
    provides_py: []
    provides_r:
      - dada2
      - phyloseq
      - vegan
      - ggplot2
      - Biostrings
