name: bio-agent-env1
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - pip
  - pip:
      - numpy
      - pandas
      - matplotlib
      - scipy
      - statsmodels
      - scikit-learn
      # biopython + ncbi-genome-download: lightweight pure-Python/CLI (no DB) so
      # the common "download a genome and compute FASTA stats in Python" task runs
      # entirely in bio-agent-env1 — without falling through to the multi-GB
      # meta-env1 just to get Bio.SeqIO or the downloader.
      - biopython
      - ncbi-genome-download
      - langchain
      - langgraph==0.3.18
      - langchain-openai
      - langchain-anthropic
      - langchain-ollama
      - langchain-community
      - openai
      - beautifulsoup4
      - lxml
      - tqdm
      - seaborn
      - networkx
      - requests
      - pyyaml
      - python-dotenv
      - tooluniverse
      - mcp
