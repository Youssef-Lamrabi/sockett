name: bio-agent-env1
channels:
  - conda-forge
  - defaults
  - bioconda
dependencies:
  - python=3.11
  - ncbi-genome-download
  - pip
  - pip:
      # Install genomeer from the package (use -e . for local dev or 'genomeer' for PyPI)
      # For local development: set GENOMEER_SRC env var or uncomment the -e line below
      # - -e ${GENOMEER_SRC:-.}
      - genomeer           # Install from PyPI (use -e . for local dev override)
      - numpy==2.1
      - pandas
      - matplotlib
      - scipy
      - statsmodels
      - scikit-learn
      - langchain
      - langgraph==0.3.18
      - langchain-openai
      - langchain-anthropic
      - langchain-ollama
      - langchain-community
      - openai
      - beautifulsoup4
      - lxml
      - tqdm
      - seaborn
      - networkx
      - requests
      - pyyaml
      - jupyter
      - notebook
      - ipykernel
      - pytest
      - transformers
      - sentencepiece
      - mcp
      - tooluniverse
      - python-dotenv
      - biopython
      - faiss-cpu          # For FAISS-based tool retrieval (GAP8)
      - langchain-community
      # gradio removed (#tobedelete — replaced by FastAPI SSE)
