name: meta-env1
channels:
  - conda-forge
  - bioconda
  - defaults
dependencies:
  - python=3.10
  - pip

  # ── ORF / Gene prediction  [ACTIF pour tests] ────────────────────────────
  - prodigal               # prodigal     → prodigal (ORF prediction)

  # ── Sequence manipulation  [ACTIF pour tests] ────────────────────────────
  - seqkit                 # run_seqkit   → seqkit
  - samtools               # indexing     → samtools faidx

  # ── Core Python  [ACTIF pour tests] ──────────────────────────────────────
  - biopython
  - numpy
  - pandas
  - matplotlib
  - scipy
  - tqdm

  # ── Assembly QC  [ACTIF pour tests] ─────────────────────────────────────
  - quast                  # run_quast → quast.py (assembly quality assessment)

  # ── Annotation + AMR  [ACTIF pour tests] ────────────────────────────────
  - prokka                 # prokka → bacterial genome annotation
  - abricate               # run_abricate → AMR/virulence gene screening

  # ── COMMENTÉ — trop lourd pour les tests (décommenter en production) ─────
  # - semibin2
