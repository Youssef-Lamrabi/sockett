name: meta-env1
channels:
  - conda-forge
  - bioconda
dependencies:
  - python>=3.12.1,<3.13   # >=3.12.1 satisfies checkm2 "python >3.12" constraint
  - pip

  # ── ORF / Gene prediction ─────────────────────────────────────────────────
  - prodigal               # prodigal     → prodigal (ORF prediction)

  # ── Read QC ──────────────────────────────────────────────────────────────
  - fastqc                 # run_fastqc   → fastqc (per-base quality + adapter content reports)
  - fastp                  # run_fastp    → fastp  (adapter trimming + QC, paired-end aware)

  # ── Sequence manipulation ─────────────────────────────────────────────────
  - seqkit                 # run_seqkit   → seqkit
  - samtools               # indexing     → samtools faidx
  - wgsim                  # wgsim        → paired-end read simulation from FASTA
  - bbmap                  # bbduk.sh     → read trimming, decontamination (conda pkg name is bbmap, not bbtools)

  # ── Core Python ───────────────────────────────────────────────────────────
  - biopython
  - numpy
  - pandas
  - matplotlib
  - scipy
  - tqdm

  # ── Assembly ─────────────────────────────────────────────────────────────
  - megahit                # run_megahit  → megahit (de-novo metagenomic assembler)
  - spades                 # spades.py / metaspades.py (SPAdes assembler, incl. metagenome mode)

  # ── Read mapping ─────────────────────────────────────────────────────────
  - minimap2               # run_minimap2 → minimap2 (fast read mapping, coverage for binning)
  - bowtie2                # bowtie2 + bowtie2-build (short-read aligner, host decontamination)
  - bwa                    # bwa mem (short-read aligner)

  # ── Binning ──────────────────────────────────────────────────────────────
  - metabat2               # run_metabat2 → metabat2 + jgi_summarize_bam_contig_depths
  # semibin2 has zero bioconda builds — installed via pip as "SemiBin" (see pip section below)
  - concoct=1.1.0          # run_concoct  → concoct (coverage + composition binning)
  - maxbin2                # run_maxbin2  → run_MaxBin2.pl

  # ── Bin quality ───────────────────────────────────────────────────────────
  # checkm2 installed via pip (see pip section) — bioconda pins h5py=2.10 incompatible with py312 stack

  # ── Taxonomy ─────────────────────────────────────────────────────────────
  - sylph                  # run_sylph    → sylph (ANI-based taxonomic profiling, <1 GB RAM)
  - kraken2                # run_kraken2  → kraken2 (k-mer taxonomic classification)
  # bracken: bioconda solver hangs in this env (10+ min). Installed manually via GitHub
  # symlinks → /home/workshop/Bracken/{bracken,bracken-build} → meta-env1/bin/
  - kaiju                  # run_kaiju    → kaiju (protein-level classification)

  # ── Assembly QC ──────────────────────────────────────────────────────────
  - quast                  # run_quast → quast.py (assembly quality assessment)

  # ── Annotation + AMR ─────────────────────────────────────────────────────
  - prokka=1.15.6          # prokka → bacterial genome annotation
  - abricate               # run_abricate → AMR/virulence gene screening
  - hmmer                  # hmmscan → protein domain search (HMM profiles)
  - diamond                # diamond → fast protein alignment (BLAST-like)

  # ── Phage annotation ─────────────────────────────────────────────────────
  # pharokka installed via pip (see pip section) — conda solver hang due to dnaapler→torch deps

  # ── Diversity / stats ────────────────────────────────────────────────────
  - lefse=1.1.2            # lefse_run.py → LEfSe (linear discriminant analysis)
  - nonpareil              # nonpareil → sequencing depth / diversity estimation

  # ── COMMENTÉ — nécessite grandes bases de données externes ────────────────
  # These tools ARE registered in the framework (tool descriptions exist) but are
  # left UNINSTALLED on purpose: each needs a multi-GB external database. The
  # planner correctly gates them ("tool not installed" → QA). Uncomment + install
  # only after provisioning the matching DB.
  # Tier 1+2 DB tools — INSTALLED MANUALLY via pip into meta-env1 (do NOT add as conda deps):
  #   * eggnog-mapper 2.1.13: `pip install --no-deps eggnog-mapper` (its biopython==1.76 pin fails
  #     to build on py3.12; uses existing biopython). DB v5.0.2 at /home/workshop/eggnog_db —
  #     downloaded MANUALLY from http://eggnog5.embl.de (the tool's hardcoded eggnogdb.embl.de is
  #     DEAD/DNS-fails). Run: emapper.py -i <faa> -o <pfx> --data_dir /home/workshop/eggnog_db -m diamond.
  #   * antismash 8.0.4: `pip install https://dl.secondarymetabolites.org/releases/8.0.4/antismash-8.0.4.tar.gz`
  #     (NOT on PyPI). DB at /home/workshop/antismash_db via download-antismash-databases. Binary deps
  #     (prodigal/diamond/hmmer/fasttree/blast/muscle/glimmerhmm) already present; only hmmpfam2(hmmer2)
  #     missing (optional). Run: antismash --databases /home/workshop/antismash_db --genefinding-tool prodigal.
  #   * metaphlan 4.2.4: `pip install metaphlan`; DB at /home/workshop/metaphlan_db via
  #     `metaphlan --install --db_dir <dir>` (flag is --db_dir, NOT --bowtie2db in 4.2.x).
  #   * kraken2 STANDARD-8 (bacteria+archaea+viral+human, 8GB) at /home/workshop/kraken2_standard8
  #     (REPLACES old viral-only DB; includes bracken kmer_distrib). BioAgent.py kraken2/bracken
  #     injection path updated to this dir.
  #   NOTE: antismash pulled biopython 1.81 + numpy 2.2.5 — verified all tools still work.
  # - humann               # humann → pathway analysis (needs multiple large DBs)
  # genomad + dbcan — INSTALLED MANUALLY via pip into meta-env1 (do NOT add as conda deps):
  #   * genomad 1.12.0: `pip install genomad`; DB (~1.6 GB) at /home/workshop/genomad_db via
  #     `genomad download-database /home/workshop`. Run: genomad end-to-end --cleanup --splits 8
  #     <in.fna> <out> /home/workshop/genomad_db (run via meta-env1).
  #   * dbcan 5.2.9: `pip install dbcan`; binary is `run_dbcan` (NOT run_dbcan.py); v5 uses
  #     subcommands. DB at /home/workshop/dbcan_db via `run_dbcan database --db_dir ...`.
  #     Run: run_dbcan CAZyme_annotation --mode protein --input_raw_data <faa> --output_dir <out>
  #     --db_dir /home/workshop/dbcan_db. Note: dbcan pinned pandas<3 (3.0.3->2.2.3) and
  #     pyhmmer 0.11 — verified RGI/checkm2/genomad/amrfinder/pharokka still work.
  #   * gget 0.30.6 (`pip install gget`): provides `gget virus` — deterministic viral genome +
  #     metadata retrieval from the NCBI Virus REST API (no DB to install, network-only). Run:
  #     gget virus '<taxon>' -o <out> --nuc_completeness complete   OR   gget virus -a '<acc>' -o <out>.
  #     Pulled ipython/jupyter/mysql-connector/psutil 7.2.2 — verified genomad/checkm2/biopython OK.
  # - gtdbtk               # gtdbtk → MAG taxonomy (needs ~80GB GTDB release DB) — NOT installed
  # AMR DB-search tools — INSTALLED MANUALLY (do NOT add as conda deps: the meta-env1
  # solver hangs). Both verified working (detect blaKPC-2 on K. pneumoniae HS11286):
  #   * rgi 6.0.8 (CARD v4.0.1): pip install git+https://github.com/arpcard/rgi.git ;
  #     CARD loaded globally via `rgi load --card_json /home/workshop/card_db/card.json`.
  #     Run with -g PYRODIGAL (external prodigal crashes); threads flag is -n.
  #   * amrfinder 4.2.7 (NCBI DB 2026-05-15): NCBI precompiled binary at
  #     /home/workshop/amrfinder/, symlinked/wrapped into bin (wrapper sets
  #     LD_LIBRARY_PATH=<env>/lib for GLIBCXX_3.4.32+); DB at /home/workshop/amrfinder/data.
  # - ncbi-amrfinderplus   # (manual binary install — see above; NOT via conda)
  # - rgi                  # (manual pip-from-git install — see above; NOT via conda)
  # R amplicon stack (dada2/phyloseq/vegan/ggplot2) lives in the SEPARATE
  # amplicon-env1 (see registry/amplicon-env1.yaml) — kept out of meta-env1 to
  # avoid Bioconductor dependency conflicts with this CLI stack.

  - pip:
    - ncbi-genome-download   # ncbi-genome-download CLI (genome download from NCBI RefSeq/GenBank)
    - SemiBin                # SemiBin2 deep-learning binner — PyPI only (no bioconda py312 build)
    - pharokka               # phage annotation — conda solver hangs due to dnaapler→torch dep tree
    - git+https://github.com/chklovski/CheckM2.git  # checkm2 — bioconda pins h5py=2.10 incompatible with py312
    - lightgbm
    - keras
    - tensorflow-cpu         # checkm2 inference engine (CPU sufficient, avoids CUDA conflict with torch)
    - multiqc                # run_multiqc → aggregate QC reports (pip: conda solver hangs in this env)
    - InSilicoSeq            # run_insilicoseq → iss (amplicon/shotgun read simulator; pip alt to grinder)
